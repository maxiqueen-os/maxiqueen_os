<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAXIQUEEN OS</title>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

/* ================= FONDO ================= */
body{
background: radial-gradient(circle at center, #0a0f1f, #000);
color:white;
overflow-x:hidden;
}

/* EFECTO ESTRELLAS */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
opacity:0.2;
z-index:-1;
}

/* ================= CONTENEDOR ================= */
.container{
padding:20px;
}

/* ================= LOGO ================= */
.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
color:#00d4ff;
text-shadow:0 0 10px #00d4ff;
}

/* ================= FORMULARIOS ================= */
.form-box{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:5px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn-primary{
background:#00d4ff;
color:black;
}

.btn-primary:hover{
transform:scale(1.05);
}

/* ================= DASHBOARD ================= */
.dashboard{
margin-top:20px;
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.module{
background:#111827;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
border:1px solid #1f2937;
}

.module:hover{
transform:scale(1.03);
box-shadow:0 0 10px #00d4ff;
}

/* ================= PLANES ================= */
.plans{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:20px;
}

.plan{
background:#111827;
padding:15px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.plan:hover{
transform:scale(1.05);
box-shadow:0 0 10px gold;
}

/* ================= CHAT ================= */
.chat{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:#111827;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.7);
overflow:hidden;
}

.chat-header{
background:#00d4ff;
color:black;
padding:10px;
font-weight:bold;
}

.chat-body{
height:200px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
border:none;
padding:10px;
background:#1f2937;
color:white;
}

.chat-input button{
background:#00d4ff;
border:none;
padding:10px;
cursor:pointer;
}

/* ================= OCULTAR DASH ================= */
.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">👑 MAXIQUEEN OS</div>

<!-- ================= REGISTRO ================= -->
<div class="form-box" id="registerBox">
<h3>Registro</h3>
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Password">
<button class="btn-primary" onclick="register()">Registrarse</button>
</div>

<!-- ================= LOGIN ================= -->
<div class="form-box">
<h3>Login</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Password">
<button class="btn-primary" onclick="login()">Iniciar Sesión</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard hidden" id="dashboard">

<div class="module">🤖 Entrar ChatOS </div> /
<div class="module">✨ Elegancia femenina</div>
<div class="module">🚦 Negocio real</div>
<div class="module">🧠 Inspeccionar</div>
<div class="module">👑 MaxiqueenOS</div>
<div class="module">🚦 Diagnóstico</div>
<div class="module">🎯 Venta Elegante</div>
<div class=" module"> <script src="/MAXIQUEEN_OS/5-RD-Lab/Maxiqueen_OS_v6/MQ_OS_index_Oficial_05Marzo.html"></script>
🎯 Panel de Control</div> 
</div>

<script src="/MAXIQUEEN_OS/5-RD-Lab/06-DOCS/🧪 IA MAXIQUEEN GUIA Y DOCUMENTO ONCOARDING.doc"></script>
<!-- ================= PLANES ================= -->
<div class="plans">

<div class="plan">
<h4>Starter</h4>
<p>$49</p>
<button class="btn-primary">Activar</button>
</div>

<div class="plan">
<h4>Pro</h4>
<p>$99</p>
<button class="btn-primary">Activar</button>
</div>

<div class="plan">
<h4>Elite</h4>
<p>$199</p>
<button class="btn-primary">Activar</button>
</div>

</div>

</div>

<!-- ================= CHAT ================= -->
<div class="chat">

<div class="chat-header">MaxiQueen Chat</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-input">
<input id="chatInput" placeholder="Escribe aquí...">
<button onclick="sendMessage()">Enviar</button>
</div>

</div>

<script>

/* ================= REGISTRO ================= */
function register(){
let email=document.getElementById("regEmail").value;
let pass=document.getElementById("regPass").value;

localStorage.setItem("user",JSON.stringify({email,pass}));
alert("Registrado correctamente");
}

/* ================= LOGIN ================= */
function login(){
let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPass").value;

let user=JSON.parse(localStorage.getItem("user"));

if(user && user.email===email && user.pass===pass){
alert("Bienvenido");
document.getElementById("dashboard").classList.remove("hidden");
}else{
alert("Error de login");
}
}

/* ================= CHAT ================= */
function sendMessage(){
let input=document.getElementById("chatInput");
let msg=input.value;

if(msg==="") return;

let chat=document.getElementById("chatBody");

chat.innerHTML += "<div>👤 "+msg+"</div>";

/* RESPUESTA AUTOMÁTICA */
setTimeout(()=>{
chat.innerHTML += "<div>🤖 Estoy respondiendo como MaxiQueen OS...</div>";
chat.scrollTop=chat.scrollHeight;
},500);

input.value="";
}

</script>

</body>
</html>
