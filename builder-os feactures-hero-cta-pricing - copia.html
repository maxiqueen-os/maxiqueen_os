<style>
:root{
  --bg:#0b0b0f;
  --panel:#111;
  --accent:#FFD700;
}
body{
  margin:0;
  height:100vh;
  display:flex;
  background:var(--bg);
  color:white;
  font-family:Arial;
}
#sidebar{
  width:260px;
  background:#0b0b0b;
  border-right:2px solid var(--accent);
  padding:12px;
  overflow:auto;
}
#sidebar h2{
  color:var(--accent);
  margin-top:0;
}
.component{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  transition:.2s;
}
.component:hover{
  transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}
#toolbar{
  background:black;
  padding:8px;
  border-bottom:2px solid var(--accent);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button{
  background:var(--accent);
  border:none;
  padding:6px 12px;
  font-weight:bold;
  cursor:pointer;
}
input, select{
  padding:6px;
  border-radius:6px;
  border:none;
}
#editor{
  flex:1;
}
#preview{
  height:40%;
  border:none;
  border-top:2px solid var(--accent);
}
#projects{
  background:#0b0b0b;
  padding:6px;
  border-radius:8px;
}
</style>

/* ============================
   CARGA DE PLANTILLA POR URL
============================ */

const params = new URLSearchParams(window.location.search);
const tpl = params.get("template");

if(tpl && TEMPLATES[tpl]){
  editor.setValue(TEMPLATES[tpl]);
}else{
  editor.setValue(baseTemplate);
}

/* ============================
   COMPONENTES
============================ */

const hero = `<section style="background:linear-gradient(135deg,#1d2040,#1a1d36);padding:80px 20px;text-align:center">
  <h1 contenteditable="true">👑 Título Principal</h1>
  <p contenteditable="true">Subtítulo editable aquí</p>
  <a href="#" class="mq-btn" contenteditable="true">Llamado a la acción</a>
</section>`;

const cta = `<section style="background:#FFD700;color:#000;padding:60px 20px;text-align:center;border-radius:24px">
  <h2 contenteditable="true">¿Listo para avanzar?</h2>

const features = `<section style="padding:60px 20px">

/* ============================
   FUNCIONES CORE
============================ */

function insert(component){
  editor.replaceRange("\n\n"+component+"\n\n", editor.getCursor());
  autosave();
  run();
}

function run(){
  const html = editor.getValue();
  document.getElementById("preview").srcdoc = html;
}

function getProjects(){
  return JSON.parse(localStorage.getItem("mq-projects") || "{}");
}

function saveProjects(data){
  localStorage.setItem("mq-projects", JSON.stringify(data));
}

function refreshProjectList(){
  const projects = getProjects();
  const list = document.getElementById("projectList");
  list.innerHTML = "<option value=''>Abrir proyecto</option>";
  for(const name in projects){
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    list.appendChild(opt);
  }
}

function saveProject(){
  const name = document.getElementById("projectName").value.trim();
  if(!name){ alert("Pon un nombre al proyecto"); return; }
  const projects = getProjects();
  projects[name] = editor.getValue();
  saveProjects(projects);
  localStorage.removeItem("mq-autosave");
  refreshProjectList();
  alert("💾 Proyecto guardado");
}

function loadProject(){
  const name = document.getElementById("projectList").value;
  if(!name) return;
  const projects = getProjects();
  editor.setValue(projects[name]);
  document.getElementById("projectName").value = name;
  run();
}

function newProject(){
  if(confirm("¿Nuevo proyecto? Se perderán cambios no guardados.")){
    editor.setValue(baseTemplate);
    document.getElementById("projectName").value = "";
    localStorage.removeItem("mq-autosave");
    run();
  }
}

function exportProject(){
  const html = editor.getValue();
  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById("projectName").value || "index") + ".html";
  a.click();
}

/* ============================
   AUTOSAVE + RECOVERY
============================ */

function autosave(){
  localStorage.setItem("mq-autosave", editor.getValue());
}

editor.on("change", ()=> autosave());

const autosaved = localStorage.getItem("mq-autosave");
if(autosaved){
  if(confirm("🔁 Hay un borrador sin guardar. ¿Recuperarlo?")){
    editor.setValue(autosaved);
  }
}

/* ============================
   INIT
============================ */

refreshProjectList();
run();
</script>
