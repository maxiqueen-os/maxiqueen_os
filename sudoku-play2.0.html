<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku PRO 👑</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f1a;
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

h1 {
  text-align: center;
  font-size: 22px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 2px;
}

input {
  width: 100%;
  aspect-ratio: 1;
  text-align: center;
  font-size: 18px;
  border: none;
  background: #111;
  color: white;
}

input.fixed {
  background: #333;
  font-weight: bold;
}

input.active {
  background: #1f2937;
}

.controls {
  margin-top: 15px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #7c3aed;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button.secondary {
  background: #374151;
}

.status {
  margin-top: 10px;
  text-align: center;
  font-size: 13px;
}
</style>
</head>

<body>
<div class="app">

<h1>Sudoku MaxiQueen PRO 👑</h1>

<div class="top-bar">
  <div id="timer">⏱️ 0s</div>
  <div id="lives">❤️ 3</div>
</div>

<div id="grid" class="grid"></div>

<div class="controls">
  <button onclick="newGame('easy')">Fácil</button>
  <button onclick="newGame('medium')">Medio</button>
  <button onclick="newGame('hard')">Difícil</button>
  <button onclick="newGame('expert')">Experto</button>
  <button onclick="newGame('extreme')">Extremo</button>
  <button onclick="resetGame()" class="secondary">Reiniciar</button>
</div>

<div class="controls">
  <button onclick="check()">Verificar</button>
  <button onclick="solve()">Resolver</button>
</div>

<div class="status" id="status">Listo</div>

</div>

<script>
let solution = [];
let lives = 3;
let timer = 0;
let interval;

function startTimer() {
  clearInterval(interval);
  timer = 0;
  interval = setInterval(() => {
    timer++;
    document.getElementById("timer").textContent = "⏱️ " + timer + "s";
  }, 1000);
}

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 81; i++) {
    const input = document.createElement("input");

    input.addEventListener("focus", () => highlight(i));
    input.addEventListener("input", () => validateInput(input, i));

    grid.appendChild(input);
  }
}

function highlight(index) {
  document.querySelectorAll("input").forEach(el => el.classList.remove("active"));
  const inputs = document.querySelectorAll("input");

  const row = Math.floor(index / 9);
  const col = index % 9;

  inputs.forEach((el, i) => {
    let r = Math.floor(i / 9);
    let c = i % 9;

    if (r === row || c === col) el.classList.add("active");
  });
}

function generateBoard() {
  let board = Array(81).fill(0);

  function isValid(b, r, c, n) {
    for (let i = 0; i < 9; i++) {
      if (b[r*9+i] === n || b[i*9+c] === n) return false;
    }
    let br = Math.floor(r/3)*3;
    let bc = Math.floor(c/3)*3;
    for (let i=0;i<3;i++)
      for (let j=0;j<3;j++)
        if (b[(br+i)*9+(bc+j)]===n) return false;
    return true;
  }

  function fill(b, i=0) {
    if (i >= 81) return true;
    if (b[i] !== 0) return fill(b, i+1);

    let nums = [1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);

    for (let n of nums) {
      let r = Math.floor(i/9), c = i%9;
      if (isValid(b,r,c,n)) {
        b[i]=n;
        if (fill(b,i+1)) return true;
        b[i]=0;
      }
    }
    return false;
  }

  fill(board);
  return board;
}

function removeCells(board, level) {
  const levels = {
    easy: 30,
    medium: 45,
    hard: 55,
    expert: 65,
    extreme: 72
  };

  let remove = levels[level];
  let b = [...board];

  while (remove > 0) {
    let i = Math.floor(Math.random()*81);
    if (b[i] !== 0) {
      b[i] = 0;
      remove--;
    }
  }
  return b;
}

function newGame(level) {
  lives = 3;
  document.getElementById("lives").textContent = "❤️ 3";

  createGrid();
  solution = generateBoard();
  let puzzle = removeCells(solution, level);

  document.querySelectorAll("input").forEach((input, i) => {
    if (puzzle[i]) {
      input.value = puzzle[i];
      input.disabled = true;
      input.classList.add("fixed");
    } else {
      input.value = "";
      input.disabled = false;
      input.classList.remove("fixed");
    }
  });

  startTimer();
  setStatus("Nivel: " + level);
}

function validateInput(input, i) {
  let val = parseInt(input.value);

  if (!val || val < 1 || val > 9) {
    input.value = "";
    return;
  }

  if (val !== solution[i]) {
    lives--;
    document.getElementById("lives").textContent = "❤️ " + lives;
    input.style.background = "#8b0000";

    if (lives <= 0) {
      setStatus("💀 Perdiste");
      solve();
    }
  } else {
    input.style.background = "#111";
  }
}

function check() {
  let ok = true;
  document.querySelectorAll("input").forEach((input,i)=>{
    if(parseInt(input.value)!==solution[i]) ok=false;
  });
  setStatus(ok ? "✅ Correcto" : "❌ Incorrecto");
}

function solve() {
  document.querySelectorAll("input").forEach((input,i)=>{
    input.value = solution[i];
  });
  setStatus("Resuelto");
}

function resetGame() {
  newGame("easy");
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

createGrid();
</script>

</body>
</html>
